      youtube: {channel_id: "UCHslw1-47qgzXYi7q-EmW7Q", upload_type: "long_form", category_id: "10"}
      instagram: {page_id: "1227338877121646", upload_type: "reel", reel_max_duration: 90}
      tiktok: {account: "@lofimidnight", upload_type: "video"}
    output_dir: "output/lofi_videos/"
    schedule: ["09:00", "15:00", "21:00"]
    content_rules:
      min_duration_sec: 1800
      max_duration_sec: 7200
      target_lufs: -14
      aspect_ratio: "16:9"

  text_confessions:
