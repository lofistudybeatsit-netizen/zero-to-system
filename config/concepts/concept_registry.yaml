# CONCEPT REGISTRY
concepts:
  lost_love_promo:
    active: true
    description: "Promo canzoni originali — lost love story music"
    platforms:
      youtube: {channel_id: "YOUR_YT", upload_type: "both", category_id: "10"}
      instagram: {page_id: "YOUR_IG", upload_type: "reel", reel_max_duration: 60}
      tiktok: {account: "@yourmusic", upload_type: "video", max_duration: 60}
    output_dir: "output/promo_videos/"
    schedule: ["12:00", "18:00"]
    content_rules:
      min_duration_sec: 15
      max_duration_sec: 300
      target_lufs: -14
      aspect_ratio_long: "16:9"
      aspect_ratio_short: "9:16"

  lofi_study_beats:
    active: true
    description: "LoFi study beats 1-2h"
