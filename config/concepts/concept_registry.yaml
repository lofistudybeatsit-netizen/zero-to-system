settings:
  telegram:
    enabled: true
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"
    poll_timeout_hours: 24
    fallback_auto_select: true
    max_options: 3
  cache_enabled: true
  cache_ttl_hours: 168
  cache_dir: "assets/backgrounds/cache/"
  max_retries: 3
