name: Content Scheduler

on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 15 * * *'
  workflow_dispatch:
    inputs:
      run_now:
        description: 'Esegui job specifico'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - music
          - story
      test_connectivity:
        description: 'Testa connettività di rete prima'
        required: false
        default: false
        type: boolean

jobs:
  schedule-content:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # ← Timeout globale per evitare blocchi infiniti
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install moviepy Pillow requests pyyaml schedule

      - name: Test connectivity (optional)
        if: github.event.inputs.test_connectivity == 'true'
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
        run: |
          python -c "
          import sys
          sys.path.insert(0, 'src')
          from publishers.instagram_uploader import InstagramUploader
          import os
          uploader = InstagramUploader(os.environ['INSTAGRAM_ACCESS_TOKEN'], os.environ['INSTAGRAM_USER_ID'])
          uploader.test_connectivity()
          "

      - name: Run content scheduler
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
        run: |
          RUN_NOW="${{ github.event.inputs.run_now }}"
          if [ -z "$RUN_NOW" ]; then
            RUN_NOW="all"
          fi
          python scripts/deploy/cron_scheduler.py --run-now "$RUN_NOW"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: output-files
          path: |
            output/
            !output/**/*.mp4
            !output/**/*.mp3
          retention-days: 3